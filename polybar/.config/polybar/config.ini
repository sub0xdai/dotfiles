[bar/toph]
monitor = ${env:MONITOR:HDMI-0}
width = 100%
height = 28pt
radius = 0

font-0 = JetBrainsMono Nerd Font:size=12;6
font-1 = Noto Color Emoji:scale=10;2

; dpi = 96


bottom = false
line-size = 6pt

#border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.flamingo}

modules-left = xworkspaces 
modules-right = date pulseaudio memory cpu weather


cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3
; modules-center = date
;modules-center = date override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt


[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.mauve}
label-active-foreground = ${colors.text}
label-active-underline = ${colors.overlay0}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1
label-occupied-foreground = ${colors.overlay2}

label-urgent = %name%
label-urgent-background = ${colors.overlay1}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.overlay0}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/battery]
type = internal/battery
format-prefix = "BAT "
format-prefix-foreground = ${colors.primary}
full-at = 99
format-charging = <animation-charging> <label-charging>
animation-charging-0 = пү„
animation-charging-1 = пүғ
animation-charging-2 = пүӮ
animation-charging-3 = пүҒ
animation-charging-4 = пүҖ
; Framerate in milliseconds
animation-charging-framerate = 750
animation-charging-foreground = ${colors.peach}
format-discharging = <ramp-capacity> <label-discharging>
ramp-capacity-0 = пү„
ramp-capacity-1 = пүғ
ramp-capacity-2 = пүӮ
ramp-capacity-3 = пүҒ
ramp-capacity-4 = пүҖ
low-at = 5
battery = BAT1
adapter = ACAD
poll-interval = 5

[network-base]
type = internal/network
interval = 5
format-connected =  <ramp-signal> <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected =   %signal%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%


[module/weather]
type = custom/script
exec = ~/.config/polybar/weather.sh
interval = 1800
format-prefix = "MELB "
format-prefix-foreground = ${colors.primary}
label = %output%

[module/bt-battery]
type = custom/script
exec = bluetoothctl info 4C:87:5D:80:F2:A3 2>/dev/null | grep -oP 'Battery Percentage: 0x\w+ \(\K\d+(?=\))'
format-prefix = "BT "
format-prefix-foreground = ${colors.primary}
label = %output%%
interval = 60

[module/date]
type = internal/date
interval = 1
format-margin = 2
date = %Y-%m-%d %H:%M
date-alt = %A, %d %B %Y
label = %date%
label-foreground = ${colors.primary}



[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
