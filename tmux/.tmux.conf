# sub0xda1
# Terminal multiplexer
# Sesh picker ‚ÄĒ shared fzf config, parameterized by initial query
# Usage: __sesh_pick [initial-query]
# ctrl-a: all | ctrl-t: tmux | ctrl-g: config | ctrl-x: zoxide | ctrl-f: fd | ctrl-d: kill
bind-key "a" run-shell "sesh connect \"$(
  sesh list -i -H | fzf-tmux -p 100%,100% --no-border \
    --ansi --list-border --no-sort \
    --prompt '  ' \
    --pointer '‚ĖĆ' \
    --input-border --header-border \
    --color 'fg:#a9b1d6,bg:-1,hl:#7aa2f7,fg+:#c0caf5,bg+:#292e42,hl+:#7dcfff' \
    --color 'info:#e0af68,prompt:#bb9af7,pointer:#7dcfff,marker:#9ece6a,spinner:#bb9af7' \
    --color 'list-border:#414868,input-border:#414868,preview-border:#414868,header-bg:-1,header-border:#414868' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-b:abort' \
    --bind 'ctrl-a:change-prompt(  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(  )+reload(sesh list --icons)' \
    --preview-window 'right:70%' \
    --preview 'sesh preview {}' \
)\""

# Root session ‚ÄĒ same picker, pre-filtered to current repo root
bind-key "R" run-shell "sesh connect \"$(
  sesh list -i -H | fzf-tmux -p 100%,100% --no-border \
    --query \"$(sesh root)\" \
    --ansi --list-border --no-sort \
    --prompt '  ' \
    --pointer '‚ĖĆ' \
    --input-border --header-border \
    --color 'fg:#a9b1d6,bg:-1,hl:#7aa2f7,fg+:#c0caf5,bg+:#292e42,hl+:#7dcfff' \
    --color 'info:#e0af68,prompt:#bb9af7,pointer:#7dcfff,marker:#9ece6a,spinner:#bb9af7' \
    --color 'list-border:#414868,input-border:#414868,preview-border:#414868,header-bg:-1,header-border:#414868' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-b:abort' \
    --bind 'ctrl-a:change-prompt(  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(  )+reload(sesh list --icons)' \
    --preview-window 'right:70%' \
    --preview 'sesh preview {}' \
)\""

# Additional sesh bindings
bind -N "‚Ćė+l last-session (via sesh) " L run-shell "sesh last || tmux display-message -d 1000 'Oops, no last sessions found'"

bind -N "‚Ćė+9 switch to root session (via sesh) " 9 run-shell "sesh connect --root '$(pwd)'"

# Reload config
unbind r 
bind r source-file ~/.tmux.conf
 
# Prefix key settings

unbind C-b
set -g prefix F4
bind F4 send-prefix


# Faster command sequences
set -s escape-time 0

# Split panes
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Session behavior
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g base-index 1
set -g renumber-windows on
set-option -g detach-on-destroy off
set -g set-clipboard on 

# Session management - ADDED
bind -N "‚Ćė+Q kill current session" Q kill-session

# Yazi images etc
set -g allow-passthrough on
set -as terminal-features ",*:RGB"
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Vim-style navigation
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Vim copy mode bindings - ADDED
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection

# Status bar position
set-option -g status-position top

# Pane border colors
set -g pane-border-style fg='#4c566a'        
set -g pane-active-border-style fg='#5e81ac'  

# Mouse support
set -g mouse on

# Status line configuration
set -g @minimal-tmux-indicator true
set -g @minimal-tmux-justify "centre"
set -g @minimal-tmux-fg "#000000"
set -g @minimal-tmux-bg "#7a7284"
set -g @minimal-tmux-right true
set -g @minimal-tmux-left true
set -g @minimal-tmux-status-right "#h | %H:%M "
set -g @minimal-tmux-status "top"

# Session persistence
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session' 


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'wfxr/tmux-fzf-url'
#set -g @plugin 'omerxx/tmux-floax'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run-shell ~/.tmux/plugins/tmux-thumbs/tmux-thumbs.tmux

run '~/.tmux/plugins/tpm/tpm'
